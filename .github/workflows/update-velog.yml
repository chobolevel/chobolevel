name: Update Velog Posts

on:
  schedule:
    # 매일 한국시간 오전 9시 (UTC 0시)
    - cron: "0 0 * * *"
  workflow_dispatch: {}   # 수동 실행 버튼 활성화

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Update README with latest Velog posts
        run: node scripts/update-velog-posts.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "docs: update latest Velog posts"
          git push